<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - My Glowfit</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="auth.css">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>

<body>
    <div class="auth-container">
        <div class="auth-card bounce-in">
            <div class="logo-area">
                <div class="logo-icon" style="font-size: 4rem; color: var(--primary);">🔒</div>
                <h1 style="color: var(--text-dark); margin-top: 1rem;">Access Restricted</h1>
                <p style="font-size: 1rem; color: var(--text-muted); padding: 0 1rem; line-height: 1.5;">
                    Access Restricted. An active subscription is required to enter the My Glowfit Members Area.
                </p>
            </div>

            <div style="margin: 2rem 0;">
                <p style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 1.5rem;">
                    Unlock personalized meal plans, symptom tracking, workouts, and the complete metabolic recovery
                    protocol.
                </p>
                <a href="https://my-glowfit-quiz.vercel.app/app_sales.html" class="btn-block"
                    style="text-decoration: none; padding: 1.25rem;">
                    Subscribe Now
                </a>
            </div>

            <div class="auth-footer"
                style="margin-top: 2rem; border-top: 1px solid var(--border); padding-top: 1.5rem;">
                <p style="font-size: 0.9rem; margin-bottom: 0;">
                    <a href="mailto:support@myglowfit.com" class="btn-block"
                        style="background: transparent; border: 2px solid var(--primary); color: var(--primary); text-decoration: none; padding: 1.25rem; font-weight: 600;">
                        I already have a subscription
                    </a>
                </p>
            </div>
        </div>
    </div>
</body>

</html>
